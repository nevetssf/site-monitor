{% extends "base.html" %}
{% block title %}Dashboard — Site Monitor{% endblock %}

{% block content %}
<div x-data="dashboard()" x-init="init()">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-bold text-white">Dashboard</h1>
    <button
      @click="showAddModal = true"
      class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
    >
      + Add Site
    </button>
  </div>

  <!-- Site Grid -->
  <template x-if="sites.length === 0">
    <div class="text-center py-24 text-gray-500">
      <p class="text-4xl mb-4">◎</p>
      <p class="text-lg">No sites monitored yet.</p>
      <p class="text-sm mt-2">Click <strong class="text-gray-300">+ Add Site</strong> to get started.</p>
    </div>
  </template>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
    <template x-for="item in sites" :key="item.site.id">
      <div
        class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden flex flex-col"
        :class="{ 'opacity-60': !item.site.is_active }"
      >
        <!-- Screenshot thumbnail -->
        <a :href="'/sites/' + item.site.id" class="block bg-gray-800 h-36 overflow-hidden">
          <template x-if="item.screenshot_url">
            <img
              :src="item.screenshot_url"
              :alt="item.site.name"
              class="w-full h-full object-cover object-top"
            />
          </template>
          <template x-if="!item.screenshot_url">
            <div class="w-full h-full flex items-center justify-center text-gray-600 text-sm">
              No screenshot yet
            </div>
          </template>
        </a>

        <!-- Card body -->
        <div class="p-4 flex flex-col flex-1 gap-3">
          <!-- Name + status -->
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0">
              <p class="font-medium text-white truncate" x-text="item.site.name"></p>
              <p class="text-xs text-gray-500 truncate" x-text="item.site.url"></p>
            </div>
            <span
              class="shrink-0 text-xs font-semibold px-2 py-0.5 rounded-full"
              :class="{
                'bg-yellow-500/20 text-yellow-400': item.site.last_status === 'pending',
                'bg-red-500/20 text-red-400': item.site.last_status === 'changed',
                'bg-green-500/20 text-green-400': item.site.last_status === 'unchanged',
                'bg-red-700/20 text-red-500': item.site.last_status === 'error',
                'bg-orange-500/20 text-orange-400': item.site.last_status === 'unavailable',
              }"
              x-text="item.site.last_status.toUpperCase()"
            ></span>
          </div>

          <!-- Meta -->
          <div class="text-xs text-gray-500 flex flex-wrap gap-x-3 gap-y-1">
            <span x-show="item.site.last_checked_at">
              Checked <span x-text="timeAgo(item.site.last_checked_at)"></span>
            </span>
            <span x-show="!item.site.last_checked_at">Never checked</span>
            <span
              class="bg-gray-800 px-1.5 py-0.5 rounded text-gray-400"
              x-text="item.site.ntfy_topic ? item.site.ntfy_topic : 'default topic'"
            ></span>
          </div>

          <!-- Actions -->
          <div class="mt-auto flex items-center gap-2 pt-1">
            <!-- Toggle -->
            <button
              @click="toggleSite(item)"
              :title="item.site.is_active ? 'Disable' : 'Enable'"
              class="flex items-center gap-1.5 text-xs px-2 py-1 rounded-md transition-colors"
              :class="item.site.is_active
                ? 'bg-green-900/40 text-green-400 hover:bg-green-900/60'
                : 'bg-gray-800 text-gray-500 hover:bg-gray-700'"
            >
              <span x-text="item.site.is_active ? '● On' : '○ Off'"></span>
            </button>

            <!-- Check Now -->
            <button
              @click="checkNow(item)"
              :disabled="item.checking"
              class="flex items-center gap-1 text-xs bg-blue-900/40 text-blue-400 hover:bg-blue-900/60 px-2 py-1 rounded-md transition-colors disabled:opacity-50"
            >
              <span x-show="!item.checking">↻ Check</span>
              <span x-show="item.checking" class="animate-spin inline-block">↻</span>
            </button>

            <!-- View Details -->
            <a
              :href="'/sites/' + item.site.id"
              class="text-xs text-gray-400 hover:text-white px-2 py-1 rounded-md bg-gray-800 hover:bg-gray-700 transition-colors"
            >
              Details
            </a>

            <!-- Delete -->
            <button
              @click="deleteSite(item)"
              class="ml-auto text-xs text-red-500 hover:text-red-400 px-2 py-1 rounded-md hover:bg-red-950/40 transition-colors"
            >
              ✕
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Add Site Modal -->
  <div
    x-show="showAddModal"
    x-cloak
    class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4"
    @keydown.escape.window="showAddModal = false"
  >
    <div
      class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-md p-6"
      @click.stop
    >
      <h2 class="text-lg font-semibold mb-5">Add Site</h2>
      <form @submit.prevent="addSite()">
        <div class="space-y-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Name <span class="text-red-400">*</span></label>
            <input
              x-model="newSite.name"
              required
              type="text"
              placeholder="My Blog"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500"
            />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">URL <span class="text-red-400">*</span></label>
            <input
              x-model="newSite.url"
              required
              type="url"
              placeholder="https://example.com"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500"
            />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Check Interval</label>
            <select
              x-model="newSite.check_interval"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500"
            >
              <option value="60">1 minute</option>
              <option value="300" selected>5 minutes</option>
              <option value="900">15 minutes</option>
              <option value="1800">30 minutes</option>
              <option value="3600">1 hour</option>
              <option value="7200">2 hours</option>
              <option value="21600">6 hours</option>
              <option value="43200">12 hours</option>
              <option value="86400">24 hours</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">ntfy Topic <span class="text-gray-600 text-xs">(optional)</span></label>
            <input
              x-model="newSite.ntfy_topic"
              type="text"
              placeholder="Leave blank to use default"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500"
            />
            <p class="text-xs text-gray-600 mt-1">Leave blank to use global default topic</p>
          </div>
          <div class="flex items-center gap-2">
            <input x-model="newSite.is_active" type="checkbox" id="is_active" checked class="rounded" />
            <label for="is_active" class="text-sm text-gray-400">Active (start monitoring immediately)</label>
          </div>
        </div>

        <div class="flex gap-3 mt-6">
          <button
            type="submit"
            :disabled="adding"
            class="flex-1 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white text-sm font-medium py-2 rounded-lg transition-colors"
          >
            <span x-show="!adding">Add Site</span>
            <span x-show="adding">Adding…</span>
          </button>
          <button
            type="button"
            @click="showAddModal = false"
            class="px-4 py-2 text-sm text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors"
          >
            Cancel
          </button>
        </div>

        <p x-show="addError" class="text-red-400 text-sm mt-3" x-text="addError"></p>
      </form>
    </div>
  </div>

</div>

<script>
function dashboard() {
  return {
    sites: {{ site_data | tojson }},
    showAddModal: false,
    adding: false,
    addError: '',
    newSite: { name: '', url: '', check_interval: 300, ntfy_topic: '', is_active: true },

    init() {
      // Re-format sites array to match expected structure
      this.sites = this.sites.map(item => ({
        site: item.site,
        screenshot_url: item.screenshot_url,
        checking: false,
      }));
    },

    timeAgo(ts) {
      if (!ts) return 'never';
      const diff = (Date.now() - new Date(ts + 'Z').getTime()) / 1000;
      if (diff < 60) return Math.floor(diff) + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    },

    async addSite() {
      this.adding = true;
      this.addError = '';
      try {
        const payload = { ...this.newSite, check_interval: parseInt(this.newSite.check_interval) };
        if (!payload.ntfy_topic) delete payload.ntfy_topic;
        const resp = await fetch('/sites', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) {
          const err = await resp.json();
          this.addError = err.detail || 'Failed to add site';
          return;
        }
        const site = await resp.json();
        this.sites.unshift({ site, screenshot_url: null, checking: false });
        this.showAddModal = false;
        this.newSite = { name: '', url: '', check_interval: 300, ntfy_topic: '', is_active: true };
      } catch (e) {
        this.addError = e.message;
      } finally {
        this.adding = false;
      }
    },

    async toggleSite(item) {
      const resp = await fetch(`/sites/${item.site.id}/toggle`, { method: 'POST' });
      if (resp.ok) {
        const data = await resp.json();
        item.site.is_active = data.is_active;
      }
    },

    async checkNow(item) {
      item.checking = true;
      try {
        await fetch(`/sites/${item.site.id}/check-now`, { method: 'POST' });
        // Poll for status update after a delay
        setTimeout(async () => {
          const resp = await fetch('/sites');
          if (resp.ok) {
            const fresh = await resp.json();
            const updated = fresh.find(s => s.id === item.site.id);
            if (updated) {
              item.site.last_checked_at = updated.last_checked_at;
              item.site.last_status = updated.last_status;
              if (updated.latest_screenshot) {
                item.screenshot_url = updated.latest_screenshot + '?t=' + Date.now();
              }
            }
          }
          item.checking = false;
        }, 5000);
      } catch (e) {
        item.checking = false;
      }
    },

    async deleteSite(item) {
      if (!confirm(`Delete "${item.site.name}"? This cannot be undone.`)) return;
      const resp = await fetch(`/sites/${item.site.id}`, { method: 'DELETE' });
      if (resp.ok || resp.status === 204) {
        this.sites = this.sites.filter(i => i.site.id !== item.site.id);
      }
    },
  };
}
</script>
{% endblock %}
