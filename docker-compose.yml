services:
  site-monitor:
    build: .
    ports:
      - "8010:8000"
    volumes:
      - ./data:/app/data
    shm_size: "256m"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
